[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = [
    "echo 'Building...'",
    "echo 'Copying frontend files...',",
    "cp -r ${NIXPACKS_APP_DIR}/frontend /app/frontend 2>/dev/null || echo 'Frontend copy completed'"
]

[start]
cmd = "gunicorn backend.app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
